<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="방문 안내">
  <title>방문을 환영합니다 | SK일렉링크</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #000000;
      color: #FFFFFF;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .header {
      padding: 20px 40px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1C1C1E;
      flex-shrink: 0;
    }
    .company { font-size: 17px; font-weight: 600; color: #FFFFFF; }
    .company-sub { font-size: 12px; color: #636366; margin-top: 2px; }
    .clock-wrap { text-align: right; }
    #clock { font-size: 26px; font-weight: 300; letter-spacing: 2px; }
    #dateStr { font-size: 12px; color: #636366; margin-top: 2px; }

    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .screen.hidden { display: none; }

    .welcome-label {
      font-size: 12px;
      font-weight: 600;
      color: #636366;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .welcome-title {
      font-size: 44px;
      font-weight: 700;
      letter-spacing: -1.5px;
      margin-bottom: 48px;
      text-align: center;
    }

    .menu-row {
      display: flex;
      gap: 24px;
      width: 100%;
      max-width: 680px;
    }
    .menu-btn {
      flex: 1;
      padding: 40px 20px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .menu-btn:active { opacity: 0.8; transform: scale(0.98); }
    .menu-btn.primary { background: #FFFFFF; color: #000000; }
    .menu-btn.secondary { background: #1C1C1E; color: #FFFFFF; }
    .menu-icon { font-size: 40px; }
    .menu-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .menu-desc { font-size: 13px; opacity: 0.6; }

    .qr-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
    }
    .btn-back {
      background: #1C1C1E;
      color: #FFFFFF;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .qr-screen-title { font-size: 24px; font-weight: 700; }

    .qr-body {
      display: flex;
      align-items: center;
      gap: 64px;
    }
    .qr-frame {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 20px;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .qr-frame img { width: 180px; height: 180px; display: block; }

    .qr-desc { max-width: 280px; }
    .qr-desc p { font-size: 16px; color: #8E8E93; line-height: 1.7; }
    .qr-desc strong { color: #FFFFFF; display: block; font-size: 18px; font-weight: 700; margin-bottom: 8px; }

    .coming-icon { font-size: 56px; margin-bottom: 20px; }
    .coming-title { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
    .coming-desc { font-size: 16px; color: #636366; margin-bottom: 32px; }

    .footer {
      padding: 14px 40px;
      border-top: 1px solid #1C1C1E;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .footer-text { font-size: 12px; color: #3A3A3C; }
    .pulse {
      width: 8px; height: 8px;
      background: #30D158;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="company">SK일렉링크</div>
      <div class="company-sub">SK Electlink Co., Ltd.</div>
    </div>
    <div class="clock-wrap">
      <div id="clock">--:--</div>
      <div id="dateStr"></div>
    </div>
  </div>

  <!-- SCREEN 1: 메뉴 선택 -->
  <div id="screen1" class="screen">
    <div class="welcome-label">Welcome</div>
    <div class="welcome-title">방문을 환영합니다</div>
    <div class="menu-row">
      <button class="menu-btn primary" onclick="showVisitor()">
        <span class="menu-icon">📋</span>
        <span class="menu-title">방문자 등록</span>
        <span class="menu-desc">방문 목적 및 정보 등록</span>
      </button>
      <button class="menu-btn secondary" onclick="showParking()">
        <span class="menu-icon">🚗</span>
        <span class="menu-title">주차 등록</span>
        <span class="menu-desc">차량 번호 및 주차 등록</span>
      </button>
    </div>
  </div>

  <!-- SCREEN 2: 방문자 등록 QR -->
  <div id="screen2" class="screen hidden">
    <div class="qr-header">
      <button class="btn-back" onclick="showMenu()">← 뒤로</button>
      <div class="qr-screen-title">방문자 등록</div>
    </div>
    <div class="qr-body">
      <div class="qr-frame">
        <img id="qrImg" src="" alt="QR Code">
      </div>
      <div class="qr-desc">
        <strong>휴대폰으로 스캔하세요</strong>
        <p>카메라 앱 또는 QR 리더기로<br>코드를 스캔하면<br>방문자 등록 화면이 열립니다.</p>
      </div>
    </div>
  </div>

  <!-- SCREEN 3: 주차 등록 준비 중 -->
  <div id="screen3" class="screen hidden">
    <div class="coming-icon">🚧</div>
    <div class="coming-title">준비 중입니다</div>
    <div class="coming-desc">주차 등록 서비스는 곧 오픈됩니다.</div>
    <button class="btn-back" onclick="showMenu()">← 메뉴로 돌아가기</button>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-text">방문자 등록 시스템 · SK일렉링크</div>
    <div class="pulse"></div>
  </div>

  <script>
    const FORM_URL = 'https://woony-ux.github.io/skel_visitor_managing/';

    document.getElementById('qrImg').src =
      'https://api.qrserver.com/v1/create-qr-code/?size=180x180&color=000000&bgcolor=ffffff&data=' +
      encodeURIComponent(FORM_URL);

    function tick() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('dateStr').textContent =
        now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
    }
    setInterval(tick, 1000);
    tick();

    function showMenu()    { show('screen1'); }
    function showVisitor() { show('screen2'); }
    function showParking() { show('screen3'); }

    function show(id) {
      ['screen1','screen2','screen3'].forEach(function(s) {
        document.getElementById(s).classList.toggle('hidden', s !== id);
      });
    }
  </script>
</body>
</html>
